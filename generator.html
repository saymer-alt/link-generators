<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WARP MASQUE Generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d1117;
    color: #c9d1d9;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    line-height: 1.5;
    min-height: 100vh;
    padding: 20px;
  }
  .container {
    max-width: 700px;
    margin: 0 auto;
  }
  h1 {
    text-align: center;
    color: #58a6ff;
    font-size: 1.6rem;
    margin-bottom: 20px;
    font-weight: 600;
  }
  .card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #8b949e;
    margin-bottom: 12px;
    font-weight: 600;
  }
  label {
    display: block;
    font-size: 0.85rem;
    color: #8b949e;
    margin-bottom: 4px;
    margin-top: 12px;
  }
  input[type="text"],
  input[type="number"],
  select,
  textarea {
    width: 100%;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 10px 12px;
    color: #c9d1d9;
    font-size: 0.9rem;
    font-family: 'Consolas', 'Monaco', monospace;
    transition: border-color 0.2s;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: #58a6ff;
  }
  textarea { resize: vertical; min-height: 60px; }
  .yaml-area { min-height: 180px; font-size: 0.8rem; }
  .row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .row > * { flex: 1; min-width: 140px; }
  .subnet-group {
    display: flex;
    gap: 16px;
    align-items: center;
    margin-top: 8px;
  }
  .subnet-group label {
    display: flex;
    align-items: center;
    gap: 6px;
    margin: 0;
    cursor: pointer;
    color: #c9d1d9;
  }
  input[type="radio"] {
    accent-color: #58a6ff;
    width: 16px;
    height: 16px;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    color: #fff;
    background: #238636;
  }
  .btn:hover { background: #2ea043; }
  .btn-blue { background: #1f6feb; }
  .btn-blue:hover { background: #388bfd; }
  .btn-orange { background: #d29922; }
  .btn-orange:hover { background: #e3b341; }
  .btn-red { background: #da3633; }
  .btn-red:hover { background: #f85149; }
  .btn-gray { background: #30363d; }
  .btn-gray:hover { background: #484f58; }
  .btn-purple { background: #8957e5; }
  .btn-purple:hover { background: #a371f7; }
  .btn-group {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 16px;
  }
  .output-area {
    margin-top: 16px;
  }
  .link-block {
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 12px;
    position: relative;
  }
  .link-label {
    font-size: 0.8rem;
    color: #58a6ff;
    font-weight: 600;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .link-text {
    font-family: 'Consolas', 'Monaco', monospace;
    font-size: 0.8rem;
    color: #a5d6ff;
    word-break: break-all;
    line-height: 1.6;
  }
  .copy-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    padding: 4px 10px;
    font-size: 0.75rem;
    background: #30363d;
    border: none;
    border-radius: 6px;
    color: #c9d1d9;
    cursor: pointer;
    transition: background 0.2s;
  }
  .copy-btn:hover { background: #484f58; }
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #238636;
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 0.9rem;
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 1000;
    pointer-events: none;
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
  .toast-error { background: #da3633; }
  .pair-separator {
    text-align: center;
    color: #484f58;
    font-size: 0.8rem;
    margin: 8px 0;
    letter-spacing: 2px;
  }
  .empty-state {
    text-align: center;
    color: #484f58;
    padding: 30px;
    font-size: 0.9rem;
  }
  .hint {
    font-size: 0.75rem;
    color: #484f58;
    margin-top: 4px;
  }
  .port-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  .port-row select { flex: 1; }
  .port-row .btn { padding: 10px 14px; }
  .history-item {
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 8px 12px;
    margin-bottom: 6px;
    font-size: 0.8rem;
    font-family: monospace;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .history-item:hover { border-color: #58a6ff; }
  .history-item .time { color: #484f58; font-size: 0.7rem; }
  .small-btn { padding: 6px 12px; font-size: 0.8rem; }
  .parsed-badge {
    display: inline-block;
    background: #238636;
    color: #fff;
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 4px;
    margin-left: 8px;
    vertical-align: middle;
  }
  .field-filled { border-color: #238636 !important; }
  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
    border-bottom: 1px solid #30363d;
    padding-bottom: 4px;
  }
  .tab {
    padding: 8px 16px;
    border-radius: 6px 6px 0 0;
    cursor: pointer;
    font-size: 0.85rem;
    color: #8b949e;
    border: none;
    background: transparent;
    transition: all 0.2s;
  }
  .tab.active {
    color: #58a6ff;
    background: #0d1117;
    border-bottom: 2px solid #58a6ff;
  }
  .tab:hover { color: #c9d1d9; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
</style>
</head>
<body>
<div class="container">
  <h1>🔗 WARP MASQUE Generator</h1>

  <!-- YAML Парсер -->
  <div class="card">
    <div class="card-title">📥 Вставь YAML-конфиг из Telegram-бота</div>
    <textarea id="yamlInput" class="yaml-area" placeholder="Вставь сюда конфиг из бота..."></textarea>
    <div class="hint">Поддерживает формат Clash/Mihomo с якорями (&warp-masque) и прямые поля</div>
    <div class="btn-group">
      <button class="btn btn-purple" onclick="parseYaml()">🔍 Распарсить YAML</button>
      <button class="btn btn-gray small-btn" onclick="clearYaml()">Очистить</button>
    </div>
  </div>

  <!-- Параметры -->
  <div class="card">
    <div class="card-title">⚙️ Параметры подключения <span id="parsedBadge" class="parsed-badge hidden">Автозаполнено</span></div>

    <label for="profileName">Имя профиля</label>
    <input type="text" id="profileName" value="WARP-MASQUE" placeholder="WARP-MASQUE">

    <div class="row">
      <div>
        <label for="privateKey">Private Key</label>
        <input type="text" id="privateKey" placeholder="MHcCAQEEI...">
      </div>
      <div>
        <label for="publicKey">Public Key</label>
        <input type="text" id="publicKey" placeholder="MFkwEwYHK...">
      </div>
    </div>

    <div class="row">
      <div>
        <label for="ip">IP (внутренний)</label>
        <input type="text" id="ip" value="172.16.0.2" placeholder="172.16.0.2">
      </div>
      <div>
        <label for="ipv6">IPv6 (внутренний)</label>
        <input type="text" id="ipv6" value="2606:4700:110:85e1:4e2a:ae6:77dd:ca2a" placeholder="2606:4700:110:85e1:4e2a:ae6:77dd:ca2a">
      </div>
    </div>

    <div class="row">
      <div>
        <label for="sni">SNI</label>
        <input type="text" id="sni" value="4pda.to" placeholder="4pda.to">
      </div>
      <div>
        <label for="dns">DNS</label>
        <input type="text" id="dns" value="1.1.1.1" placeholder="1.1.1.1">
      </div>
    </div>
  </div>

  <!-- Настройки генерации -->
  <div class="card">
    <div class="card-title">🎲 Настройки генерации</div>

    <label>Подсеть</label>
    <div class="subnet-group">
      <label><input type="radio" name="subnet" value="198" checked> 162.159.198.*</label>
      <label><input type="radio" name="subnet" value="199"> 162.159.199.*</label>
      <label><input type="radio" name="subnet" value="auto"> Авто</label>
    </div>

    <label for="port" style="margin-top:16px">Порт</label>
    <div class="port-row">
      <select id="port">
        <option value="443" selected>443</option>
        <option value="500">500</option>
        <option value="1701">1701</option>
        <option value="4500">4500</option>
        <option value="4443">4443</option>
        <option value="8443">8443</option>
        <option value="8095">8095</option>
      </select>
      <button class="btn btn-gray small-btn" onclick="randomPort()" title="Случайный порт">🎲</button>
    </div>

    <label for="pairCount" style="margin-top:16px">Количество пар (QUIC + H2)</label>
    <input type="number" id="pairCount" value="1" min="1" max="20">

    <div class="btn-group">
      <button class="btn btn-blue" onclick="randomizeIPs()">🎲 Случайные адреса</button>
      <button class="btn" onclick="generate()">⚡ Сгенерировать</button>
      <button class="btn btn-orange" onclick="copyAll()">📋 Копировать всё</button>
    </div>
  </div>

  <!-- Результат -->
  <div class="card">
    <div class="card-title">📤 Результат</div>
    <div id="output" class="output-area">
      <div class="empty-state">Нажмите «Сгенерировать» для создания ссылок</div>
    </div>
  </div>

  <!-- История -->
  <div class="card" id="historyCard" style="display:none">
    <div class="card-title">🕘 История последних генераций</div>
    <div id="historyList"></div>
    <button class="btn btn-red small-btn" style="margin-top:10px" onclick="clearHistory()">Очистить историю</button>
  </div>
</div>

<div class="toast" id="toast">Скопировано!</div>

<script>
const ports = [443, 500, 1701, 4500, 4443, 8443, 8095];
let history = [];

function getSubnet() {
  const radios = document.getElementsByName('subnet');
  for (const r of radios) if (r.checked) return r.value;
  return 'auto';
}

function randomOctet() {
  return Math.floor(Math.random() * 256);
}

function getRandomIP(subnet) {
  if (subnet === 'auto') subnet = Math.random() < 0.5 ? '198' : '199';
  return `162.159.${subnet}.${randomOctet()}`;
}

function randomizeIPs() {
  showToast('Адреса будут случайными при генерации');
}

function randomPort() {
  const p = ports[Math.floor(Math.random() * ports.length)];
  document.getElementById('port').value = p;
  showToast('Порт: ' + p);
}

function urlEncodeKey(key) {
  return key.replace(/\+/g, '%2B').replace(/\//g, '%2F').replace(/=/g, '%3D');
}

// ─── YAML Парсер ─────────────────────────────────────────────

function parseYaml() {
  const raw = document.getElementById('yamlInput').value.trim();
  if (!raw) {
    showToast('❌ Вставь YAML-конфиг', true);
    return;
  }

  try {
    const data = parseClashYaml(raw);
    if (!data) {
      showToast('❌ Не удалось распарсить YAML', true);
      return;
    }

    // Заполняем поля
    if (data.privateKey)  setField('privateKey', data.privateKey);
    if (data.publicKey)   setField('publicKey', data.publicKey);
    if (data.ip)          setField('ip', data.ip);
    if (data.ipv6)        setField('ipv6', data.ipv6);
    if (data.sni)         setField('sni', data.sni);
    if (data.dns)         setField('dns', data.dns);
    if (data.port)        document.getElementById('port').value = data.port;

    // Показываем бейдж
    const badge = document.getElementById('parsedBadge');
    badge.classList.remove('hidden');
    setTimeout(() => badge.classList.add('hidden'), 4000);

    showToast('✅ YAML распарсен, поля заполнены');
  } catch (e) {
    showToast('❌ Ошибка парсинга: ' + e.message, true);
  }
}

function setField(id, value) {
  const el = document.getElementById(id);
  el.value = value;
  el.classList.add('field-filled');
  setTimeout(() => el.classList.remove('field-filled'), 2000);
}

function clearYaml() {
  document.getElementById('yamlInput').value = '';
}

function parseClashYaml(text) {
  const result = {};
  const lines = text.split('\n');

  // Ищем якорь &warp-masque или прямые поля
  let inAnchor = false;
  let anchorIndent = -1;
  let proxySection = false;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const trimmed = line.trim();

    // Начало якоря
    if (trimmed.startsWith('warp-masque:') && trimmed.includes('&warp-masque')) {
      inAnchor = true;
      anchorIndent = line.search(/\S/);
      continue;
    }

    // Конец якоря — новая секция на том же или меньшем отступе
    if (inAnchor) {
      const currIndent = line.search(/\S/);
      if (trimmed === '' || trimmed.startsWith('#')) continue;
      if (currIndent !== -1 && currIndent <= anchorIndent && !line.trimStart().startsWith('-')) {
        inAnchor = false;
      }
    }

    // Секция proxies
    if (trimmed === 'proxies:') {
      proxySection = true;
      inAnchor = false;
    }

    // Парсим поля из якоря
    if (inAnchor) {
      parseField(line, result);
    }

    // Парсим поля из proxies (прямые или через <<:)
    if (proxySection && (trimmed.startsWith('- name:') || trimmed.startsWith('<<:'))) {
      // Смотрим следующие строки этого прокси
      let j = i;
      const proxyLines = [];
      while (j < lines.length) {
        const pl = lines[j];
        const plTrim = pl.trim();
        if (plTrim === '' || plTrim.startsWith('#')) { j++; continue; }
        const plIndent = pl.search(/\S/);
        if (plTrim.startsWith('- name:') && j > i) break;
        proxyLines.push(pl);
        j++;
      }
      for (const pl of proxyLines) {
        parseField(pl, result);
      }
    }
  }

  // Если якоря не было, ищем поля глобально
  if (!result.privateKey) {
    for (const line of lines) {
      parseField(line, result);
    }
  }

  // DNS: массив → строка
  if (result.dns && Array.isArray(result.dns)) {
    result.dns = result.dns.join(',');
  }

  return Object.keys(result).length > 0 ? result : null;
}

function parseField(line, result) {
  const m = line.match(/^\s*([a-zA-Z0-9_-]+):\s*(.+)$/);
  if (!m) return;
  const [, key, rawVal] = m;
  const val = rawVal.trim().replace(/^["']|["']$/g, '');

  const map = {
    'private-key': 'privateKey',
    'privatekey': 'privateKey',
    'public-key': 'publicKey',
    'publickey': 'publicKey',
    'ip': 'ip',
    'ipv6': 'ipv6',
    'sni': 'sni',
    'dns': 'dns',
    'port': 'port',
    'server': 'server'
  };

  const target = map[key.toLowerCase()];
  if (target && val && val !== 'true' && val !== 'false') {
    result[target] = val;
  }
}

// ─── Генерация ссылок ────────────────────────────────────────

function buildLink(server, port, profile, privateKey, publicKey, ip, ipv6, sni, dns, isH2, index) {
  const pk = urlEncodeKey(privateKey);
  const pub = urlEncodeKey(publicKey);
  const name = index > 0 ? `${profile}-${index + 1}` : profile;
  const suffix = isH2 ? '-H2' : '-QUIC';
  let url = `masque://${server}:${port}?sni=${sni}&private-key=${pk}&public-key=${pub}&ip=${ip}&udp=true&remote-dns-resolve=true`;
  if (ipv6 && ipv6.trim()) url += `&ipv6=${ipv6}`;
  if (dns && dns.trim()) url += `&dns=${dns}`;
  if (isH2) url += '&network=h2';
  url += `#${name}${suffix}`;
  return url;
}

function generate() {
  const profile = document.getElementById('profileName').value.trim() || 'WARP-MASQUE';
  const privateKey = document.getElementById('privateKey').value.trim();
  const publicKey = document.getElementById('publicKey').value.trim();
  const ip = document.getElementById('ip').value.trim();
  const ipv6 = document.getElementById('ipv6').value.trim();
  const sni = document.getElementById('sni').value.trim();
  const dns = document.getElementById('dns').value.trim();
  const port = document.getElementById('port').value;
  const pairCount = parseInt(document.getElementById('pairCount').value) || 1;
  const subnet = getSubnet();

  if (!privateKey || !publicKey) {
    showToast('❌ Укажите Private Key и Public Key', true);
    return;
  }

  const output = document.getElementById('output');
  output.innerHTML = '';
  const allLinks = [];

  for (let i = 0; i < pairCount; i++) {
    const ip1 = getRandomIP(subnet);
    const ip2 = getRandomIP(subnet);

    const quicLink = buildLink(ip1, port, profile, privateKey, publicKey, ip, ipv6, sni, dns, false, i);
    const h2Link = buildLink(ip2, port, profile, privateKey, publicKey, ip, ipv6, sni, dns, true, i);

    allLinks.push(quicLink, h2Link);

    if (i > 0) {
      const sep = document.createElement('div');
      sep.className = 'pair-separator';
      sep.textContent = '• • •';
      output.appendChild(sep);
    }

    output.appendChild(createLinkBlock(quicLink, `[${profile}] QUIC` + (i > 0 ? ` #${i + 1}` : ''), `copy-quic-${i}`));
    output.appendChild(createLinkBlock(h2Link, `[${profile}] H2` + (i > 0 ? ` #${i + 1}` : ''), `copy-h2-${i}`));
  }

  // Кнопка копирования обеих (последней пары)
  const bothBtn = document.createElement('button');
  bothBtn.className = 'btn btn-blue';
  bothBtn.style.marginTop = '12px';
  bothBtn.style.width = '100%';
  bothBtn.innerHTML = '📋 Копировать обе ссылки (последняя пара)';
  bothBtn.onclick = () => {
    const lastTwo = allLinks.slice(-2);
    navigator.clipboard.writeText(lastTwo.join('\n')).then(() => showToast('Обе ссылки скопированы!'));
  };
  output.appendChild(bothBtn);

  // Сохранить в историю
  const record = {
    time: new Date().toLocaleTimeString(),
    quic: allLinks[0],
    h2: allLinks[1],
    server1: allLinks[0].match(/masque:\/\/([^:]+)/)[1],
    server2: allLinks[1].match(/masque:\/\/([^:]+)/)[1],
    port: port
  };
  history.unshift(record);
  if (history.length > 10) history.pop();
  renderHistory();
}

function createLinkBlock(link, label, btnId) {
  const div = document.createElement('div');
  div.className = 'link-block';
  div.innerHTML = `
    <div class="link-label">
      <span>${label}</span>
    </div>
    <div class="link-text">${link}</div>
    <button class="copy-btn" onclick="copyText('${link.replace(/'/g, "\'")}')">Копировать</button>
  `;
  return div;
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => showToast('Скопировано!'));
}

function copyAll() {
  const blocks = document.querySelectorAll('.link-text');
  if (!blocks.length) { showToast('Сначала сгенерируйте ссылки', true); return; }
  const text = Array.from(blocks).map(b => b.textContent).join('\n\n');
  navigator.clipboard.writeText(text).then(() => showToast('Все ссылки скопированы!'));
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.toggle('toast-error', !!isError);
  t.classList.add('show');
  setTimeout(() => { t.classList.remove('show'); t.classList.remove('toast-error'); }, 2500);
}

function renderHistory() {
  const card = document.getElementById('historyCard');
  const list = document.getElementById('historyList');
  if (!history.length) { card.style.display = 'none'; return; }
  card.style.display = 'block';
  list.innerHTML = history.map((h, idx) => `
    <div class="history-item" onclick="copyText('${h.quic.replace(/'/g, "\'")}')">
      <span>${h.server1}:${h.port} / ${h.server2}:${h.port}</span>
      <span class="time">${h.time}</span>
    </div>
  `).join('');
}

function clearHistory() {
  history = [];
  renderHistory();
}
</script>
</body>
</html>
