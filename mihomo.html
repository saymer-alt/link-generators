<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WARP & Mihomo Unified Generator</title>
<style>
  :root { --bg:#0d1117; --card:#161b22; --border:#30363d; --text:#c9d1d9; --muted:#8b949e; --accent:#58a6ff; --green:#238636; --red:#da3633; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;line-height:1.5;padding:20px}
  .container{max-width:800px;margin:0 auto}
  h1{text-align:center;color:var(--accent);font-size:1.6rem;margin-bottom:20px}
  
  /* Tabs */
  .tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:20px}
  .tab{flex:1;padding:12px;text-align:center;cursor:pointer;background:transparent;border:none;color:var(--muted);font-size:0.95rem;font-weight:600;transition:all .2s}
  .tab.active{color:var(--accent);border-bottom:2px solid var(--accent);background:rgba(88,166,255,0.05)}
  .tab:hover:not(.active){color:var(--text)}
  .tab-content{display:none}.tab-content.active{display:block}

  /* Cards & Inputs */
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px}
  .card-title{font-size:.85rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:12px;font-weight:600;display:flex;align-items:center;gap:8px}
  label{display:block;font-size:.85rem;color:var(--muted);margin:12px 0 4px}
  input,select,textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:.9rem;font-family:monospace;transition:border-color .2s}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
  textarea{resize:vertical;min-height:120px}
  .row{display:flex;gap:12px;flex-wrap:wrap}.row>*{flex:1;min-width:140px}
  
  /* Buttons */
  .btn-group{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
  .btn{padding:10px 18px;border:none;border-radius:8px;font-size:.9rem;font-weight:500;cursor:pointer;color:#fff;background:var(--green);transition:opacity .2s}
  .btn:hover{opacity:.85}
  .btn-blue{background:#1f6feb}.btn-gray{background:var(--border)}.btn-red{background:var(--red)}.btn-purple{background:#8957e5}
  
  /* Output */
  .link-block{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px;position:relative}
  .link-label{font-size:.8rem;color:var(--accent);font-weight:600;margin-bottom:6px}
  .link-text{font-family:monospace;font-size:.8rem;color:#a5d6ff;word-break:break-all;line-height:1.6}
  .copy-btn{position:absolute;top:10px;right:10px;padding:4px 10px;font-size:.75rem;background:var(--border);border:none;border-radius:6px;color:var(--text);cursor:pointer}
  .copy-btn:hover{background:#484f58}
  
  /* Toast & Utils */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--green);color:#fff;padding:10px 20px;border-radius:8px;opacity:0;transition:all .3s;z-index:1000;pointer-events:none}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
  .subnet-group{display:flex;gap:16px;align-items:center;margin-top:8px}
  .subnet-group label{display:flex;align-items:center;gap:6px;margin:0;cursor:pointer;color:var(--text)}
  .hint{font-size:.75rem;color:#484f58;margin-top:4px}
  .field-filled{border-color:var(--green)!important}
  .parsed-badge{background:var(--green);color:#fff;font-size:.7rem;padding:2px 8px;border-radius:4px}
  #mihomoOutput{min-height:300px;font-size:.8rem}
</style>
</head>
<body>
<div class="container">
  <h1>🔗 WARP & Mihomo Unified</h1>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('warp')">⚡ WARP MASQUE Links</button>
    <button class="tab" onclick="switchTab('mihomo')">⚙️ Mihomo Config Builder</button>
  </div>

  <!-- TAB 1: WARP GENERATOR -->
  <div id="tab-warp" class="tab-content active">
    <div class="card">
      <div class="card-title">📥 Импорт из Telegram <span id="parsedBadge" class="parsed-badge" style="display:none">Заполнено</span></div>
      <textarea id="yamlInput" placeholder="Вставь YAML-конфиг от бота..."></textarea>
      <div class="btn-group">
        <button class="btn btn-purple" onclick="parseYaml()">🔍 Распарсить</button>
        <button class="btn btn-gray" onclick="document.getElementById('yamlInput').value=''">Очистить</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">🔑 Параметры</div>
      <label>Имя профиля</label>
      <input type="text" id="profileName" value="WARP-MASQUE">
      <div class="row">
        <div><label>Private Key</label><input type="text" id="privateKey"></div>
        <div><label>Public Key</label><input type="text" id="publicKey"></div>
      </div>
      <div class="row">
        <div><label>IP (int)</label><input type="text" id="ip" value="172.16.0.2"></div>
        <div><label>IPv6 (int)</label><input type="text" id="ipv6" placeholder="Заполняется из конфига"></div>
      </div>
      <div class="row">
        <div><label>SNI</label><input type="text" id="sni" value="4pda.to"></div>
        <div><label>DNS</label><input type="text" id="dns" value="1.1.1.1"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">🎲 Генерация</div>
      <label>Подсеть</label>
      <div class="subnet-group">
        <label><input type="radio" name="subnet" value="198" checked> 198.*</label>
        <label><input type="radio" name="subnet" value="199"> 199.*</label>
        <label><input type="radio" name="subnet" value="auto"> Авто</label>
      </div>
      <div class="row" style="margin-top:12px">
        <div>
          <label>Порт</label>
          <select id="port">
            <option>443</option><option>500</option><option>1701</option>
            <option>4500</option><option>4443</option><option>8443</option><option>8095</option>
          </select>
        </div>
        <div>
          <label>Пар (QUIC+H2)</label>
          <input type="number" id="pairCount" value="1" min="1" max="20">
        </div>
      </div>
      <div class="btn-group">
        <button class="btn btn-blue" onclick="randomPort()">🎲 Порт</button>
        <button class="btn" onclick="generateWarp()">⚡ Сгенерировать ссылки</button>
        <button class="btn btn-gray" onclick="sendToMihomo()">🚀 В Mihomo Builder</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">📤 Результат (masque://)</div>
      <div id="warpOutput"><div class="hint" style="padding:20px;text-align:center">Нажмите «Сгенерировать»</div></div>
    </div>
  </div>

  <!-- TAB 2: MIHOMO BUILDER -->
  <div id="tab-mihomo" class="tab-content">
    <div class="card">
      <div class="card-title">📋 Входные данные (ссылки / подписки)</div>
      <textarea id="mihomoInput" placeholder="vless://...&#10;masque://...&#10;https://sub.url/...&#10;Можно вставить ссылки из вкладки WARP"></textarea>
      <div class="hint">Поддерживает: vless, vmess, trojan, ss, hy2, tuic, masque, mieru, WG (.conf), HTTP(S) подписки</div>
    </div>

    <div class="card">
      <div class="card-title">⚙️ Настройки Mihomo</div>
      <div class="row">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin:0">
          <input type="checkbox" id="cfgLan" checked style="width:auto"> 🌐 Allow LAN (0.0.0.0)
        </label>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin:0">
          <input type="checkbox" id="cfgSocks" checked style="width:auto"> 🔌 Mixed Port 7890
        </label>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin:0">
          <input type="checkbox" id="cfgWebUI" checked style="width:auto"> 🖥️ Web UI
        </label>
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;margin:0">
          <input type="checkbox" id="cfgSubMode" checked style="width:auto"> 📡 Sub Mode
        </label>
      </div>
      <div class="btn-group">
        <button class="btn" onclick="buildMihomo()">⚡ Build Config</button>
        <button class="btn btn-gray" onclick="copyMihomo()">📋 Copy YAML</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">📦 Mihomo YAML</div>
      <textarea id="mihomoOutput" readonly></textarea>
    </div>
  </div>
</div>

<div class="toast" id="toast">Done!</div>

<!-- WEB4CORE RUNTIME -->
<script src="./web4core.runtime-bcaf347.js"></script>

<script>
// === TABS ===
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

// === TOAST ===
function showToast(msg, err) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = err ? 'var(--red)' : 'var(--green)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// === YAML PARSER (WARP) ===
function parseYaml() {
  const raw = document.getElementById('yamlInput').value.trim();
  if (!raw) return showToast('Вставь YAML', true);
  const r = {};
  const map = {'private-key':'privateKey','public-key':'publicKey','ip':'ip','ipv6':'ipv6','sni':'sni','dns':'dns','port':'port'};
  
  // Простой regex-парсер для формата бота
  for (const [k, v] of Object.entries(map)) {
    const m = raw.match(new RegExp(`^\\s*${k}:\\s*(.+?)\\s*$`, 'mi'));
    if (m) r[v] = m[1].replace(/^["']|["']$/g, '');
  }
  // DNS array
  const dnsM = raw.match(/^\s*dns:\s*\[([^\]]+)\]/m);
  if (dnsM) r.dns = dnsM[1].split(',').map(s=>s.trim().replace(/["']/g,'')).join(',');

  if (!r.privateKey) return showToast('Не найдены ключи в YAML', true);
  
  ['privateKey','publicKey','ip','ipv6','sni','dns'].forEach(k => {
    const el = document.getElementById(k);
    // Заполняем только если значение есть в конфиге, иначе оставляем как есть (или пустым для ipv6)
    if (r[k]) {
      el.value = r[k];
      el.classList.add('field-filled');
      setTimeout(() => el.classList.remove('field-filled'), 2000);
    } else if (k === 'ipv6') {
      // Если в конфиге нет IPv6, очищаем поле, чтобы не подставлять дефолт
      el.value = '';
    }
  });
  if (r.port) document.getElementById('port').value = r.port;
  
  document.getElementById('parsedBadge').style.display = 'inline-block';
  showToast('✅ YAML распарсен');
}

// === WARP LINK GENERATOR ===
function urlEncodeKey(k) { return k.replace(/\+/g,'%2B').replace(/\//g,'%2F').replace(/=/g,'%3D'); }
function randomOctet() { return Math.floor(Math.random()*256); }
function getSubnet() {
  const c = document.querySelector('input[name="subnet"]:checked');
  const v = c ? c.value : 'auto';
  return v === 'auto' ? (Math.random()<0.5?'198':'199') : v;
}
function randomPort() {
  const ports = [443,500,1701,4500,4443,8443,8095];
  document.getElementById('port').value = ports[Math.floor(Math.random()*ports.length)];
}

let lastGeneratedLinks = [];

function generateWarp() {
  const profile = document.getElementById('profileName').value.trim() || 'WARP-MASQUE';
  const pk = document.getElementById('privateKey').value.trim();
  const pub = document.getElementById('publicKey').value.trim();
  const ip = document.getElementById('ip').value.trim();
  const ipv6 = document.getElementById('ipv6').value.trim();
  const sni = document.getElementById('sni').value.trim();
  const dns = document.getElementById('dns').value.trim();
  const port = document.getElementById('port').value;
  const count = parseInt(document.getElementById('pairCount').value) || 1;

  if (!pk || !pub) return showToast('Нужны ключи!', true);

  const out = document.getElementById('warpOutput');
  out.innerHTML = '';
  lastGeneratedLinks = [];

  for (let i = 0; i < count; i++) {
    const s = getSubnet();
    const ip1 = `162.159.${s}.${randomOctet()}`;
    const ip2 = `162.159.${s}.${randomOctet()}`;
    const suffix = count > 1 ? `-${i+1}` : '';
    
    let base = `masque://IP:${port}?sni=${sni}&private-key=${urlEncodeKey(pk)}&public-key=${urlEncodeKey(pub)}&ip=${ip}&udp=true&remote-dns-resolve=true`;
    if (ipv6) base += `&ipv6=${ipv6}`;
    if (dns) base += `&dns=${dns}`;
    
    const quic = base.replace('IP', ip1) + `#${profile}${suffix}-QUIC`;
    const h2 = base.replace('IP', ip2) + `&network=h2#${profile}${suffix}-H2`;
    
    lastGeneratedLinks.push(quic, h2);
    out.innerHTML += `<div class="link-block"><div class="link-label">🔷 QUIC ${suffix}</div><div class="link-text">${quic}</div><button class="copy-btn" onclick="copyText('${quic.replace(/'/g,"\\'")}')">Copy</button></div>`;
    out.innerHTML += `<div class="link-block"><div class="link-label">🟢 H2 ${suffix}</div><div class="link-text">${h2}</div><button class="copy-btn" onclick="copyText('${h2.replace(/'/g,"\\'")}')">Copy</button></div>`;
  }
  showToast(`✅ Сгенерировано ${count * 2} ссылок`);
}

function sendToMihomo() {
  if (!lastGeneratedLinks.length) return showToast('Сначала сгенерируй ссылки', true);
  document.getElementById('mihomoInput').value = lastGeneratedLinks.join('\n');
  switchTab('mihomo');
  // Auto-click build
  setTimeout(buildMihomo, 100);
}

// === MIHOMO BUILDER (via web4core) ===
function buildMihomo() {
  const raw = document.getElementById('mihomoInput').value.trim();
  if (!raw) return showToast('Вставь ссылки или подписки', true);
  
  const api = globalThis.web4core;
  if (!api?.buildFromRequest) return showToast('❌ web4core.runtime не загружен!', true);

  try {
    const result = api.buildFromRequest({
      core: 'mihomo',
      input: raw,
      wgBeans: [],
      options: {
        addSocks: document.getElementById('cfgSocks').checked,
        addTun: false,
        webUI: document.getElementById('cfgWebUI').checked,
        urlTest: 'https://google.com/generate_204',
        mihomoSubscriptionMode: document.getElementById('cfgSubMode').checked
      }
    });

    let yaml = typeof result.data === 'string' ? result.data : JSON.stringify(result.data, null, 2);
    
    // PATCH: Allow LAN
    if (document.getElementById('cfgLan').checked) {
      yaml = yaml.replace(/^allow-lan:\s*false\s*$/m, 'allow-lan: true');
      if (!yaml.includes('bind-address')) {
        yaml = yaml.replace(/^(allow-lan:\s*true\s*)$/m, '$1\nbind-address: "*"');
      }
    }

    document.getElementById('mihomoOutput').value = yaml;
    showToast('✅ Mihomo config built!');
  } catch (e) {
    showToast('❌ ' + (e.message || e), true);
  }
}

function copyMihomo() {
  const text = document.getElementById('mihomoOutput').value;
  if (!text) return showToast('Нет конфига', true);
  navigator.clipboard.writeText(text).then(() => showToast('YAML скопирован!'));
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => showToast('Скопировано!'));
}
</script>
</body>
</html>
